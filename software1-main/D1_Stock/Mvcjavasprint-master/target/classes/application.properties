# ===== Keycloak / OAuth2 Resource Server =====
keycloak.auth-server-url=http://localhost:9090
keycloak.realm=D1_prod
keycloak.client-id=back_api_rest
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:JCXOibBnqRwi0ArDBXkTDkMh0La1Z7TZ}
# issuer-uri: emisor del JWT; valida el claim "iss" y los tiempos del token.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/d1
# jwk-set-uri: claves publicas con las que se valida la firma del JWT (carga perezosa, no rompe el arranque).
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/d1/protocol/openid-connect/certs