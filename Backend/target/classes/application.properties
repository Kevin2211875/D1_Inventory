spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=StarWars181222.
spring.jpa.show-sql=true

# ===================== Keycloak =====================
# Servidor de identidad (Keycloak) y realm de la tienda. Se pueden sobreescribir por variable de entorno.
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:9090}
keycloak.realm=${KEYCLOAK_REALM:D1_prod}
# Cliente confidencial del backend: necesita "Direct Access Grants" (login) y "Service Accounts" (Admin API).
keycloak.client-id=${KEYCLOAK_CLIENT_ID:d1-backend}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:CHANGE_ME}

# ============ Resource Server (validación del JWT) ============
# Claves publicas del realm para validar la firma del token y el emisor (claim iss).
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}

## Hibernate Properties
# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto = validate

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE